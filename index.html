<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>Forklift Inspection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --side:#0f172a;--side2:#1e293b;--side3:#334155;
  --teal:#06b6d4;--teal2:#0891b2;--teal-lt:#e0f7fa;
  --green:#10b981;--glt:#d1fae5;--gdk:#065f46;
  --red:#ef4444;--rlt:#fee2e2;--rdk:#991b1b;
  --amber:#f59e0b;--alt:#fef3c7;--adk:#92400e;
  --purple:#8b5cf6;--plt:#ede9fe;
  --bg:#f1f5f9;--card:#fff;
  --bdr:#e2e8f0;--bdr2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 4px 6px rgba(0,0,0,0.05),0 10px 30px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;}

/* ===== LAYOUT ===== */
.layout{display:flex;flex:1;overflow:hidden;height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{width:200px;background:var(--side);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}

.logo{padding:18px 16px;border-bottom:1px solid var(--side3);display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--teal);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:0.5px;}
.logo-sub{font-size:9px;color:rgba(255,255,255,0.4);margin-top:1px;}
.sidebar-nav{flex:1;padding:10px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,0.55);font-size:12px;font-weight:500;transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:var(--side2);color:rgba(255,255,255,0.85);}
.nav-item.on{background:var(--side2);color:#fff;border-left-color:var(--teal);}
.nav-icon{font-size:18px;flex-shrink:0;width:22px;text-align:center;}
.nav-label{white-space:nowrap;}
.sync-area{padding:12px 16px;border-top:1px solid var(--side3);}
.sync-pill{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--side2);border-radius:8px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-txt{font-size:10px;color:rgba(255,255,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* Top bar */
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:var(--txt);flex:1;}
.topbar-sub{font-size:11px;color:var(--txt3);margin-top:1px;}
.lang-btn{border:1.5px solid var(--bdr);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card);color:var(--txt2);font-family:inherit;display:flex;align-items:center;gap:5px;}
.lang-btn:hover{background:var(--bg);}

/* Content area */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}

/* Views */
.view{display:none;height:100%;}.view.on{display:block;}

/* ===== TOP CONTROL BAR ===== */
.ctrl-bar{background:var(--card);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;flex-wrap:wrap;align-items:stretch;position:sticky;top:0;z-index:10;gap:0;}
.lbl{font-size:11px;color:var(--txt3);font-weight:600;white-space:nowrap;}
.ctrl-item{display:flex;align-items:center;gap:7px;padding:0 16px;height:48px;border-bottom:2px solid transparent;cursor:default;white-space:nowrap;flex-shrink:0;}
.ctrl-item.has-border{border-right:1px solid var(--bdr);}
.ctrl-item .lbl{font-size:11px;color:var(--txt3);font-weight:600;}
select,input[type=month],input[type=date],input[type=text]{border:none;padding:0;font-size:13px;font-family:inherit;background:transparent;color:var(--txt);height:auto;outline:none;font-weight:500;cursor:pointer;}
select:focus,input:focus{outline:none;}
.ctrl-sep{width:1px;background:var(--bdr);align-self:stretch;margin:10px 0;flex-shrink:0;}
.btn-teal{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;height:32px;display:flex;align-items:center;gap:5px;margin:auto 0 auto 8px;}
.btn-teal:hover{background:var(--teal2);}
.btn-teal:active{opacity:0.85;}
.btn-outline{border:1.5px solid var(--bdr);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--txt2);font-family:inherit;height:32px;margin:auto 0 auto 0;}
.btn-outline:hover{background:var(--bg);}

/* ===== INNER CONTENT ===== */
.inner{padding:18px 20px;}

/* ===== PROGRESS CARD ===== */
.prog-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:16px;}
.prog-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.prog-title{font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;}
.prog-pct{font-size:28px;font-weight:700;color:var(--txt);line-height:1;}
.prog-bar-wrap{height:6px;background:var(--bdr);border-radius:6px;margin-bottom:14px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:6px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.pstat{background:var(--bg);border-radius:8px;padding:10px;text-align:center;}
.pstat-n{font-size:22px;font-weight:700;line-height:1;}
.pstat-l{font-size:9px;color:var(--txt3);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}

/* ===== WEEK CALENDAR ===== */
.week-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr);}
.week-nav-title{font-size:13px;font-weight:700;}
.week-nav-btns{display:flex;gap:6px;}
.wnbtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt2);}
.wnbtn:hover{background:var(--bg);}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:14px 16px;}
.wday{border-radius:10px;padding:10px 4px 8px;text-align:center;cursor:pointer;border:1.5px solid transparent;background:var(--bg);transition:all 0.12s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.wday:hover:not(.c-hol){border-color:var(--teal);background:#f0fdfe;}
.wday:active{transform:scale(0.93);}
.wday-dow{font-size:9px;font-weight:700;color:var(--txt3);}
.wday-dow.sun{color:#ef4444;}.wday-dow.sat{color:#3b82f6;}
.wday-num{font-size:17px;font-weight:700;color:var(--txt);}
.wday-num.sun{color:#ef4444;}.wday-num.sat{color:#3b82f6;}
.wday-ic{font-size:11px;font-weight:700;min-height:14px;}
.wday.sel{background:var(--side)!important;border-color:var(--side)!important;}
.wday.sel .wday-dow,.wday.sel .wday-num,.wday.sel .wday-ic{color:var(--teal)!important;}
.wday.tod{border-color:var(--teal);}
.wday.tod .wday-num{color:var(--teal);}
.wday.c-ok{background:var(--glt);border-color:#6ee7b7;}
.wday.c-ok .wday-num{color:var(--gdk);}
.wday.c-ng{background:var(--rlt);border-color:#fca5a5;}
.wday.c-ng .wday-num{color:var(--rdk);}
.wday.c-hol{background:repeating-linear-gradient(45deg,#e8ecf0,#e8ecf0 3px,#f8fafc 3px,#f8fafc 8px);cursor:default;}
.wday.c-hol .wday-num{color:var(--txt3);}
.wday.c-es{background:transparent;border:none;cursor:default;}

/* ===== DAY PANEL ===== */
.day-header{background:var(--side);border-radius:12px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.day-date{font-size:16px;font-weight:700;color:#fff;}
.day-op{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;}
.no-day{text-align:center;padding:60px 20px;color:var(--txt3);font-size:14px;}
.hol-notice{text-align:center;padding:40px 20px;color:var(--txt3);font-size:14px;background:var(--card);border-radius:12px;box-shadow:var(--shadow);}

/* ===== INSPECTION ITEMS ===== */
.section-title-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.section-title-dot{width:4px;height:18px;background:var(--teal);border-radius:2px;}
.section-title-txt{font-size:12px;font-weight:700;color:var(--txt);text-transform:uppercase;letter-spacing:0.5px;}
.section-title-dot.purple{background:var(--purple);}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.items-grid.single{grid-template-columns:1fr;}
.item-card{background:var(--card);border-radius:10px;border:1.5px solid var(--bdr);padding:11px 12px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--shadow);transition:border-color 0.15s;}
.item-card.ok{background:var(--glt);border-color:#6ee7b7;}
.item-card.ng{background:var(--rlt);border-color:#fca5a5;}
.item-num{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.3px;}
.item-card.ok .item-num{color:var(--gdk);}
.item-card.ng .item-num{color:var(--rdk);}
.item-txt{font-size:11px;color:var(--txt2);line-height:1.5;flex:1;}
.item-card.ok .item-txt{color:var(--gdk);}
.item-card.ng .item-txt{color:var(--rdk);}
.item-btns{display:flex;gap:5px;}
.ibtn{flex:1;height:32px;border-radius:7px;border:1.5px solid var(--bdr);background:#f8fafc;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cbd5e1;font-family:inherit;transition:all 0.12s;}
.ibtn:active{transform:scale(0.88);}
.ibtn.ok-active{background:var(--glt);border-color:#6ee7b7;color:var(--gdk);}
.ibtn.ng-active{background:var(--rlt);border-color:#fca5a5;color:var(--rdk);}

/* ===== ACTION BAR ===== */
.action-bar{display:flex;gap:8px;margin-top:2px;margin-bottom:16px;}
.action-bar .btn{flex:1;padding:13px;font-size:13px;font-weight:700;border-radius:10px;border:none;cursor:pointer;font-family:inherit;}
.btn-complete{background:var(--teal);color:#fff;}
.btn-complete:hover{background:var(--teal2);}
.btn-clear{background:var(--card);color:var(--txt2);border:1.5px solid var(--bdr)!important;}
.btn-clear:hover{background:var(--bg);}
.hint-box{background:var(--teal-lt);border-radius:10px;border:1px solid #b2ebf2;padding:10px 14px;font-size:11px;color:#0e7490;margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* ===== MANAGER PANEL ===== */
/* Manager panel table */
.mg-table-wrap{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.mg-table{width:100%;border-collapse:collapse;}
.mg-thead th{background:var(--side);color:rgba(255,255,255,0.7);font-size:10px;font-weight:700;padding:11px 14px;text-align:left;border-right:1px solid var(--side3);letter-spacing:0.5px;text-transform:uppercase;white-space:nowrap;}
.mg-thead th:last-child{border-right:none;}
.mg-week-row td{background:#f8fafc;padding:10px 14px;font-size:12px;font-weight:700;color:var(--txt2);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);}
.mg-week-row td.week-title{color:var(--txt);display:flex;align-items:center;gap:8px;}
.mg-week-badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.mg-week-badge.done{background:var(--glt);color:var(--gdk);}
.mg-week-badge.pend{background:var(--alt);color:var(--adk);}
.mg-data-row td{padding:12px 14px;border-bottom:1px solid var(--bdr);vertical-align:top;}
.mg-data-row:last-child td{border-bottom:none;}
.mg-stat-cell{text-align:center;}
.mg-stat-n{font-size:20px;font-weight:700;line-height:1;}
.mg-stat-l{font-size:9px;color:var(--txt3);margin-top:3px;}
.mg-dots-cell{padding:10px 14px!important;}
.mg-dots{display:flex;flex-wrap:wrap;gap:4px;}
.dot{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid transparent;}
.dot.ok{background:var(--glt);color:var(--gdk);border-color:#6ee7b7;}
.dot.ng{background:var(--rlt);color:var(--rdk);border-color:#fca5a5;}
.dot.em{background:var(--bg);color:var(--txt3);border-color:var(--bdr2);}
.dot.hl{background:repeating-linear-gradient(45deg,#e2e8f0,#e2e8f0 3px,#f8fafc 3px,#f8fafc 7px);border-color:var(--bdr);}
.mg-action-cell{text-align:right;vertical-align:middle!important;white-space:nowrap;}
.btn-confirm{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-confirm:hover{background:var(--teal2);}
.btn-confirm.purple{background:var(--purple);}
.btn-confirm.done-btn{background:var(--glt);color:var(--gdk);border:1.5px solid #6ee7b7;}
.btn-undo{background:transparent;color:var(--txt3);border:1.5px solid var(--bdr);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:6px;}
.btn-undo:hover{background:var(--bg);}
.mg-cfm-info{font-size:11px;color:var(--gdk);margin-top:4px;}
/* monthly mg card */
.monthly-mg-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.monthly-mg-hdr{background:var(--purple);padding:13px 18px;color:#fff;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.monthly-item-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr);font-size:12px;}
.monthly-item-row:last-child{border-bottom:none;}
.mi-ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.mi-ic.ok{background:var(--glt);color:var(--gdk);}
.mi-ic.ng{background:var(--rlt);color:var(--rdk);}
.mi-ic.e{background:var(--bg);color:var(--txt3);}
/* cfm-box kept for monthly */
.cfm-box{padding:14px 16px;}
.cfm-box.done{background:#f0fdf4;}
.cfm-box.pend{background:#fffbeb;}
.cfm-done-title{font-size:13px;font-weight:700;color:#15803d;display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.cfm-done-info{font-size:12px;color:#166534;padding:8px 12px;background:rgba(255,255,255,0.7);border-radius:8px;border:1px solid #bbf7d0;}
.cfm-pend-txt{font-size:12px;color:#92400e;margin-bottom:10px;line-height:1.5;}
/* wk-card kept for undo button compatibility */
.wk-card{display:none;}
.wk-hdr,.wk-stats,.wk-dots,.wk-stat,.wk-hdr-title,.wk-hdr-right,.wk-hdr-status,.wk-undo-btn,.wk-stat-n,.wk-stat-l{display:none;}
.monthly-mg-card{background:var(--card);border-radius:12px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden;}
.monthly-mg-hdr{background:var(--purple);padding:13px 18px;color:#fff;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.monthly-item-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bdr);font-size:12px;}
.monthly-item-row:last-child{border-bottom:none;}
.mi-ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.mi-ic.ok{background:var(--glt);color:var(--gdk);}
.mi-ic.ng{background:var(--rlt);color:var(--rdk);}
.mi-ic.e{background:var(--bg);color:var(--txt3);}

/* ===== MONTHLY TABLE ===== */
.tbl-section{padding:0 20px 18px;}

/* ===== SETTINGS ===== */
.settings-wrap{padding:18px 20px;}
.slist{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
.slist-hdr{background:var(--side2);color:rgba(255,255,255,0.8);padding:11px 16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.slist-hdr-dot{width:3px;height:14px;background:var(--teal);border-radius:2px;}
.srow{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bdr);gap:10px;}
.srow:last-child{border-bottom:none;}
.srow-name{font-size:13px;font-weight:500;color:var(--txt);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.srow-actions{display:flex;gap:6px;flex-shrink:0;}
.sadd{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--bdr);background:var(--bg);}
.sadd input{flex:1;border:1.5px solid var(--bdr);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;background:var(--card);color:var(--txt);}
.sadd input:focus{outline:none;border-color:var(--teal);}
.btn-sm{border:1.5px solid var(--bdr);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card);color:var(--txt);font-family:inherit;white-space:nowrap;}
.btn-sm:hover{background:var(--bg);}
.btn-sm.red{background:var(--rlt);color:var(--rdk);border-color:#fca5a5;}
.btn-sm.navy{background:var(--side);color:#fff;border-color:var(--side);}
.btn-sm.amber{background:var(--alt);color:var(--adk);border-color:#fde68a;}
.reset-row{background:#fff5f5;}
.reset-row .srow-name{color:var(--rdk);}

/* ===== BADGES ===== */
.badge{font-size:11px;font-weight:600;padding:5px 14px;border-radius:0;border:none;border-bottom:2px solid transparent;background:transparent;}
.badge-ok{color:var(--green);border-bottom-color:var(--green);}
.badge-ng{color:var(--red);border-bottom-color:var(--red);}
.badge-em{color:var(--txt3);border-bottom-color:transparent;}
.badge-hol{color:var(--txt3);border-bottom-color:transparent;}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--side);color:#fff;padding:11px 20px;border-radius:22px;font-size:12px;font-weight:600;z-index:999;display:none;box-shadow:var(--shadow-md);white-space:nowrap;}

/* ===== DIALOG ===== */
.dialog-bg{display:none;background:rgba(15,23,42,0.6);padding:20px;align-items:center;justify-content:center;position:fixed;top:0;left:0;right:0;bottom:0;z-index:998;backdrop-filter:blur(4px);}
.dialog-bg.show{display:flex;}
.dialog-sheet{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.dialog-sheet h3{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--txt);}
.dialog-sheet p{font-size:13px;color:var(--txt2);margin-bottom:16px;line-height:1.6;}
.dialog-acts{display:flex;gap:8px;margin-top:14px;}
.dialog-acts .btn-dlg{flex:1;padding:12px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border:none;}
.btn-dlg-cancel{background:var(--bg);color:var(--txt2);}
.btn-dlg-ok{background:var(--red);color:#fff;}
.slabel{font-size:10px;font-weight:700;color:var(--txt3);margin-bottom:4px;letter-spacing:0.5px;text-transform:uppercase;}
.hlist{border:1.5px solid var(--bdr);border-radius:8px;max-height:120px;overflow-y:auto;margin-bottom:8px;background:var(--card);}
.hlist-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:13px;gap:8px;}

.hadd{display:flex;gap:6px;margin-bottom:8px;align-items:center;}

@media(min-width:769px) and (max-width:1024px){

  .sidebar .nav-label,.sidebar .logo-text,.sidebar .logo-sub,.sync-area{display:none;}
  .nav-item{justify-content:center;padding:12px 0;}
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .sidebar{display:none!important;}
  html,body{height:100%;overflow:auto;}

  .main{height:auto;overflow:visible;}
  .content{overflow:visible;height:auto;padding-bottom:70px;}

  .topbar{padding:10px 12px;}

  .pstat-n{font-size:14px;}
  .pstat-l{font-size:7px;}

  .settings-wrap{padding:10px 12px;}

  .dialog-sheet{max-width:calc(100vw - 32px);}
  .toast{bottom:72px;font-size:11px;padding:9px 16px;}

var S = {
  lang:"ja", y:new Date().getFullYear(), m:new Date().getMonth()+1, d:null,
  weekStart:null,
  op:"", operators:["山田 太郎","鈴木 花子","田中 一郎"],

  hols:[], workdays:[], checks:{}
};

function L(){ return T[S.lang]; }
function JH(){ return S.lang==="vi"?HOL_VI:HOL_JA; }
function dk(y,m,d){ return y+"-"+(m<10?"0":"")+m+"-"+(d<10?"0":"")+d; }
function ck(y,m,d,ri){ return y+":"+m+":"+d+":"+ri; }
function opk(y,m,d){ return "op:"+y+":"+m+":"+d; }
function mgk(y,m,wn){ return "mg:"+y+":"+m+":"+wn; }
function mmgk(y,m){ return "mmg:"+y+":"+m; }
function getMmg(y,m){ return S.checks[mmgk(y,m)]||{}; }
function setMmg(y,m,v){ S.checks[mmgk(y,m)]=v; }
function dim(y,m){ return new Date(y,m,0).getDate(); }
function isHol(y,m,d){ var k=dk(y,m,d); return !!(JH()[k])||S.hols.indexOf(k)>=0; }
function isOff(y,m,d){ var k=dk(y,m,d); if(S.workdays.indexOf(k)>=0) return false; var w=new Date(y,m-1,d).getDay(); return isHol(y,m,d)||w===0||w===6; }
function lastWD(y,m){ var d=dim(y,m); while(isOff(y,m,d)) d--; return d; }
function gv(y,m,d,ri){ return S.checks[ck(y,m,d,ri)]||"e"; }
function sv(y,m,d,ri,v){ S.checks[ck(y,m,d,ri)]=v; }
function getDayOp(y,m,d){ return S.checks[opk(y,m,d)]||""; }
function setDayOp(y,m,d,n){ S.checks[opk(y,m,d)]=n; }
function getMg(y,m,wn){ return S.checks[mgk(y,m,wn)]||{}; }
function setMg(y,m,wn,v){ S.checks[mgk(y,m,wn)]=v; }
function daySt(y,m,d){ if(isOff(y,m,d)) return "hol"; var ok=0,ng=0; for(var i=0;i<7;i++){ var v=gv(y,m,d,i); if(v==="ok") ok++; else if(v==="ng") ng++; } if(ng>0) return "ng"; if(ok===7) return "ok"; return "e"; }
function save(){ try{ localStorage.setItem("fl12",JSON.stringify(S)); }catch(e){} }
function load(){ try{ var s=localStorage.getItem("fl12"); if(s){ var d=JSON.parse(s); var ks=["lang","y","m","d","op","operators","mgr","managers","hols","workdays","checks"]; for(var i=0;i<ks.length;i++) if(d[ks[i]]!==undefined) S[ks[i]]=d[ks[i]]; } }catch(e){} }

var toastT={};
function toast(id,msg){
  var el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg; el.style.display="block";
  clearTimeout(toastT[id]);
  toastT[id]=setTimeout(function(){el.style.display="none";},2500);
}

function getWeekStart(y,m,d){
  var dt=new Date(y,m-1,d);
  var dow=dt.getDay();
  dt.setDate(dt.getDate()-dow);
  return dt;
}
function renderWeek(){
  var y=S.y,m=S.m;
  var l=L();
  var t=new Date(),ty=t.getFullYear(),tm=t.getMonth()+1,td=t.getDate();
  if(!S.weekStart){
    var ws=getWeekStart(y,m,S.d||td);
    S.weekStart={y:ws.getFullYear(),m:ws.getMonth()+1,d:ws.getDate()};
  }
  var ws=new Date(S.weekStart.y,S.weekStart.m-1,S.weekStart.d);
  var we=new Date(ws); we.setDate(we.getDate()+6);
  var wsLabel=l.fmt_month(ws.getFullYear(),ws.getMonth()+1);
  if(ws.getMonth()!==we.getMonth()) wsLabel+="-"+l.fmt_month(we.getFullYear(),we.getMonth()+1);
  document.getElementById("weekLbl").textContent=wsLabel;
  var g=document.getElementById("weekGrid"); g.innerHTML="";
  for(var i=0;i<7;i++){
    var dt=new Date(ws); dt.setDate(ws.getDate()+i);
    var dy=dt.getFullYear(),dm=dt.getMonth()+1,dd=dt.getDate(),dow=dt.getDay();
    var off=isOff(dy,dm,dd),st=daySt(dy,dm,dd);
    var el=document.createElement("div"); el.className="wday";
    if(off) el.classList.add("c-hol");
    else{
      if(dow===0) el.classList.add("c-sun"); else if(dow===6) el.classList.add("c-sat");
      if(st==="ok") el.classList.add("c-ok"); else if(st==="ng") el.classList.add("c-ng");
    }
    var isTod=(dy===ty&&dm===tm&&dd===td);
    var isSel=(S.d===dd&&S.y===dy&&S.m===dm);
    if(isSel) el.classList.add("sel");
    else if(isTod&&!off) el.classList.add("tod");
    var dowCls=(dow===0?" sun":dow===6?" sat":"");
    var icon=!off?(st==="ok"?"✓":st==="ng"?"✕":""):"";
    var iconColor=st==="ok"?"style='color:var(--gdk);'":st==="ng"?"style='color:var(--rdk);'":"style='color:var(--txt3);'";
    el.innerHTML="<div class='wday-dow"+dowCls+"'>"+l.dow[dow]+"</div><div class='wday-num"+dowCls+"'>"+dd+"</div>"+(icon?"<div class='wday-ic' "+iconColor+">"+icon+"</div>":"<div class='wday-ic'></div>");
    if(!off){
      (function(dy2,dm2,dd2){ el.addEventListener("click",function(){
        S.y=dy2; S.m=dm2; S.d=dd2;
        var dop=getDayOp(dy2,dm2,dd2); if(dop){S.op=dop;document.getElementById("opSel").value=dop;}
        renderWeek(); renderDayPanel(); updateProgress();
        setTimeout(function(){document.getElementById("dayPanel").scrollIntoView({behavior:"smooth"});},60);
      }); })(dy,dm,dd);
    }
    g.appendChild(el);
  }
}

function renderCal(){ renderWeek(); }

function updateProgress(){
  var y=S.y,m=S.m,days=dim(y,m),l=L();
  var ok=0,ng=0,em=0,tot=0;
  for(var d=1;d<=days;d++){
    if(!isOff(y,m,d)){
      tot++;
      var st=daySt(y,m,d);
      if(st==="ok") ok++; else if(st==="ng") ng++; else em++;
    }
  }
  var pct=tot>0?Math.round((ok+ng)/tot*100):0;
  document.getElementById("prog_fill").style.width=pct+"%";
  document.getElementById("prog_pct").textContent=pct+"%";
  document.getElementById("prog_ok").textContent=ok;
  document.getElementById("prog_ng").textContent=ng;
  document.getElementById("prog_em").textContent=em;
  document.getElementById("prog_days").textContent=tot;
  document.getElementById("prog_label").textContent=l.prog_label||"今月の点検進捗";
  document.getElementById("prog_ok_l").textContent=l.stat_done;
  document.getElementById("prog_ng_l").textContent=l.stat_ng;
  document.getElementById("prog_em_l").textContent=l.stat_em;
  document.getElementById("prog_days_l").textContent=l.stat_days;
}

function makeTglItem(label,v,onToggle,monthly){
  var numMatch=label.match(/^(\d+)\.\s*(.*)/);
  var num=numMatch?numMatch[1]+".":"";
  var txt=numMatch?numMatch[2]:label;
  var card=document.createElement("div");
  card.className="item-card"+(v==="ok"?" ok":v==="ng"?" ng":"");
  var numEl=document.createElement("div"); numEl.className="item-num"; numEl.textContent=num;
  var txtEl=document.createElement("div"); txtEl.className="item-txt"; txtEl.textContent=txt;
  var btns=document.createElement("div"); btns.className="item-btns";
  var nb=document.createElement("button"); nb.className="ibtn"+(v==="ng"?" ng-active":""); nb.textContent="×";
  var ob=document.createElement("button"); ob.className="ibtn"+(v==="ok"?" ok-active":""); ob.textContent="○";
  nb.addEventListener("click",function(){
    var cur=v; v=(cur==="ng"?"e":"ng");
    card.className="item-card"+(v==="ng"?" ng":"");
    nb.className="ibtn"+(v==="ng"?" ng-active":"");
    ob.className="ibtn";
    onToggle(v);
  });
  ob.addEventListener("click",function(){
    var cur=v; v=(cur==="ok"?"e":"ok");
    card.className="item-card"+(v==="ok"?" ok":"");
    ob.className="ibtn"+(v==="ok"?" ok-active":"");
    nb.className="ibtn";
    onToggle(v);
  });
  btns.appendChild(nb); btns.appendChild(ob);
  card.appendChild(numEl); card.appendChild(txtEl); card.appendChild(btns);
  return card;
}

function renderDayPanel(){
  var p=document.getElementById("dayPanel"),l=L();
  if(!S.d){ p.innerHTML="<div class='no-day'>"+l.no_day+"</div>"; return; }
  var y=S.y,m=S.m,d=S.d,dow=new Date(y,m-1,d).getDay(),off=isOff(y,m,d);
  if(S.op&&!getDayOp(y,m,d)){setDayOp(y,m,d,S.op);save();}
  var dop=getDayOp(y,m,d)||S.op||"—";
  var st=daySt(y,m,d);
  var stTxt=off?l.holiday:(st==="ok"?l.st_done:st==="ng"?l.st_ng:l.st_empty);
  var stCls=st==="ok"?"badge-ok":st==="ng"?"badge-ng":st==="hol"?"badge-hol":"badge-em";

  var wrap=document.createElement("div");

  // Day header
  var hdr=document.createElement("div"); hdr.className="day-header";
  hdr.innerHTML="<div class='day-header-left'><div class='day-date'>"+l.fmt_date(y,m,d,l.dow[dow])+"</div><div class='day-op'>"+l.lbl_op+": "+dop+"</div></div>";
  wrap.appendChild(hdr);

  if(off){
    var hm=document.createElement("div"); hm.className="hol-notice"; hm.textContent=l.holiday;
    wrap.appendChild(hm);
  } else {
    // Daily items - 2 column grid
    var dc=document.createElement("div"); dc.className="card";
    var dch=document.createElement("div"); dch.className="card-hdr";
    dch.innerHTML="<div class='section-title-bar'><div class='section-title-dot'></div><span class='section-title-txt'>"+l.daily_hdr+"</span></div>";
    var dcb=document.createElement("div"); dcb.className="items-section";
    var grid=document.createElement("div"); grid.className="items-grid";
    for(var ri=0;ri<l.daily.length;ri++){
      (function(ri2){
        var v=gv(y,m,d,ri2);
        var card=makeTglItem(l.daily[ri2],v,function(nv){
          tapCellDirect(y,m,d,ri2,false,nv);
        },false);
        grid.appendChild(card);
      })(ri);
    }
    dcb.appendChild(grid); dc.appendChild(dch); dc.appendChild(dcb);
    wrap.appendChild(dc);

    // Monthly
    var lwd=lastWD(y,m);
    if(d===lwd){
      var mc=document.createElement("div"); mc.className="card";
      var mch=document.createElement("div"); mch.className="card-hdr";
      mch.innerHTML="<div class='section-title-bar'><div class='section-title-dot purple'></div><span class='section-title-txt' style='color:var(--purple);'>"+l.monthly_hdr+"</span></div>";
      var mcb=document.createElement("div"); mcb.className="items-section";
      var mgrid=document.createElement("div"); mgrid.className="items-grid single";
      for(var mi=0;mi<l.monthly.length;mi++){
        (function(mi2){
          var ri2=7+mi2,v=gv(y,m,1,ri2);
          var card=makeTglItem(l.monthly[mi2],v,function(nv){
            tapCellDirect(y,m,1,ri2,true,nv);
          },true);
          mgrid.appendChild(card);
        })(mi);
      }
      mcb.appendChild(mgrid); mc.appendChild(mch); mc.appendChild(mcb);
      wrap.appendChild(mc);
    } else {
      var hb=document.createElement("div");
      hb.className="hint-box";
      hb.innerHTML="&#x2139; "+l.hint_pre+m+"/"+lwd+l.hint_suf;
      wrap.appendChild(hb);
    }

    // Action bar
    var ar=document.createElement("div"); ar.className="action-bar";
    var cb=document.createElement("button"); cb.className="btn btn-complete"; cb.textContent=l.complete_btn;
    var rb=document.createElement("button"); rb.className="btn btn-clear"; rb.textContent=l.clear_btn;
    cb.addEventListener("click",completeDay); rb.addEventListener("click",clearDay);
    ar.appendChild(cb); ar.appendChild(rb); wrap.appendChild(ar);
  }
  p.innerHTML=""; p.appendChild(wrap);
}

function tapCell(nb,ob,y,m,d,ri,monthly,nv){ var cur=gv(y,m,d,ri),next=(cur===nv?"e":nv); sv(y,m,d,ri,next); save(); nb.classList.toggle("on",next==="ng"); ob.classList.toggle("on",next==="ok"); renderWeek(); updateProgress(); }
function tapCellDirect(y,m,d,ri,monthly,nv){
  if(!S.op&&!getDayOp(y,m,d)){ toast("toast0",(L().need_op||"担当者を選択してください")); return; }
  sv(y,m,d,ri,nv); save(); renderWeek(); updateProgress();
}

function completeDay(){
  var y=S.y,m=S.m,d=S.d,n=0,l=L();
  if(!S.op||!getDayOp(y,m,d)&&!S.op){ var sel=document.getElementById("opSel");
    if(sel){sel.style.border="2px solid var(--red)";setTimeout(function(){sel.style.border="";},2000);}
    toast("toast0",l.need_op||"担当者を選択してください"); return; }
  for(var ri=0;ri<7;ri++) if(gv(y,m,d,ri)==="e"){sv(y,m,d,ri,"ok");n++;}
  if(d===lastWD(y,m)) for(var ri=7;ri<11;ri++) if(gv(y,m,1,ri)==="e"){sv(y,m,1,ri,"ok");n++;}

function buildCSV(cb){
  var y=S.y,m=S.m,days=dim(y,m),lwd=lastWD(y,m),l=L();

  var weeks=Math.ceil(days/7);
  for(var wn=1;wn<=weeks;wn++){ var mg=getMg(y,m,wn),ws=(wn-1)*7+1,we=Math.min(ws+6,days); row=[l.fmt_wkcsv(m,ws,we,wn)]; for(d=1;d<=days;d++) row.push(d===ws?(mg.done?l.csv_cfm+mg.mgr+" "+mg.date:l.csv_uncfm):""); rows.push(row); }
  var lines=[]; for(var li=0;li<rows.length;li++){ var cells=[]; for(var ci=0;ci<rows[li].length;ci++) cells.push(esc(rows[li][ci])); lines.push(cells.join(",")); }
  var csv="\ufeff"+lines.join("\r\n"); var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}); var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="forklift_"+y+"_"+m+".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);   var csv="﻿"+lines.join("\r\n");
  cb(csv,"forklift_"+y+"_"+m+".csv");

var GAS = "https://script.google.com/macros/s/AKfycbxyaIrICo7ZLISQNu3nYR78BVxAE9q0km6j0Rsp58CHKnGYdTKE-Zncm8Wz-XVA5jaBJg/exec";
var _pending = {};
var _pushTimer = null;
var _syncing = false;

function showSync(msg, col) {
  var el = document.getElementById("syncStatus");
  var dot = document.getElementById("syncDot");
  if (el) el.textContent = msg;
  if (dot) dot.style.background = (col==="#27ae60"||col==="var(--green)") ? "var(--green)" : (col==="#e74c3c"||col==="var(--red)") ? "var(--red)" : "var(--amber)";
}

/* JSONP でサーバーからデータ取得 */
function syncFromServer() {
  if (_syncing) return;
  _syncing = true;
  showSync("同期中...", "#f39c12");
  var cb = "cb" + Date.now();
  var el = document.createElement("script");
  var done = false;
  var timer = setTimeout(function() {
    if (done) return; done = true;
    delete window[cb]; if (el.parentNode) el.parentNode.removeChild(el);
    _syncing = false; showSync("オフライン", "#e74c3c");
  }, 10000);
  window[cb] = function(res) {
    if (done) return; done = true;
    clearTimeout(timer); delete window[cb]; if (el.parentNode) el.parentNode.removeChild(el);
    _syncing = false;
    if (res && res.ok && res.data) {
      var changed = false;
      for (var k in res.data) {
        var v = res.data[k];
        if (k === "operators") { try { var a=JSON.parse(v); if(a&&a.length){S.operators=a;changed=true;} } catch(e){} }
        else if (k === "managers") { try { var a=JSON.parse(v); if(a&&a.length){S.managers=a;changed=true;} } catch(e){} }
        else if (k === "hols") { try { S.hols=JSON.parse(v); changed=true; } catch(e){} }
        else if (k === "workdays") { try { S.workdays=JSON.parse(v); changed=true; } catch(e){} }
        else {
          if (k.indexOf("mg:") === 0) { try { var mg=JSON.parse(v); if(S.checks[k]!==v){S.checks[k]=mg;changed=true;} } catch(e){ S.checks[k]=v; } }
          else { if (S.checks[k] !== v) { S.checks[k] = v; changed = true; } }
        }
      }
      if (changed) { save(); renderCal(); renderDayPanel(); renderOps(); renderMgrs(); }
      var t = new Date();
      showSync("最終同期: "+t.getHours()+":"+(t.getMinutes()<10?"0":"")+t.getMinutes()+":"+(t.getSeconds()<10?"0":"")+t.getSeconds(), "#27ae60");
    } else { showSync("エラー", "#e74c3c"); }
  };
  el.src = GAS + "?action=getAll&callback=" + cb + "&t=" + Date.now();
  document.head.appendChild(el);
}

/* GETリクエストでデータ送信 */
function pushToServer(updates) {
  for (var k in updates) _pending[k] = updates[k];
  clearTimeout(_pushTimer);
  _pushTimer = setTimeout(function() {
    var toSend = {};
    for (var k in _pending) toSend[k] = _pending[k];
    _pending = {};
    showSync("送信中...", "#f39c12");
    var payload = encodeURIComponent(JSON.stringify(toSend));
    var cb2 = "cb" + Date.now();
    var el2 = document.createElement("script");
    window[cb2] = function(res) {
      delete window[cb2]; if (el2.parentNode) el2.parentNode.removeChild(el2);
      showSync(res&&res.ok ? "保存済み ✓" : "エラー", res&&res.ok ? "#27ae60" : "#e74c3c");
    };
    el2.src = GAS + "?action=setMany&payload=" + payload + "&callback=" + cb2 + "&t=" + Date.now();
    document.head.appendChild(el2);
  }, 1200);
}

function pushMeta() {
  pushToServer({
    operators: JSON.stringify(S.operators),
    managers: JSON.stringify(S.managers),
    hols: JSON.stringify(S.hols),
    workdays: JSON.stringify(S.workdays)
  });
}
